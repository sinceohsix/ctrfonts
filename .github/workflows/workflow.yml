name: ctrfont2

on:
  workflow_dispatch:
    inputs:
      font_url:
        description: 'URL to a TTF/OTF font file'
        required: true
      font_size:
        description: 'Font size in points'
        required: true
        default: '20'
      font_name:
        description: 'Font name (e.g. PopHappiness)'
        required: true

defaults:
  run:
    shell: pwsh
    
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download custom font
        run: curl -L "${{ github.event.inputs.font_url }}" -o mergefonts/custom_font.ttf

      - name: Merge custom font w/ nintendo_NTLG-DB_001.ttf
        shell: bash
        run: |
          fontforge/bin/fontforge.exe mergefonts/merge-fonts.py \
            mergefonts/custom_font.ttf \
            mergefonts/nintendo_NTLG-DB_001.ttf \
            mergefonts/merged_font.ttf
            
      - name: Get name of custom font
        run: |
          pip install fonttools --quiet
          $fontName = python3 -c "from fontTools.ttLib import TTFont; tt = TTFont('mergefonts/merged_font.ttf'); print(tt['name'].getDebugName(1))"
          $fontSlug = $fontName -replace '\s+', '-'
          echo "FONT_NAME=$fontName" >> $env:GITHUB_ENV
          echo "FONT_NAME_SLUG=$fontSlug" >> $env:GITHUB_ENV
          
      - name: Install merged font to Windows
        run: |
          Copy-Item mergefonts/merged_font.ttf -Destination "C:\Windows\Fonts\merged_font.ttf"
          New-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Fonts" `
            -Name "${{ env.FONT_NAME }} (TrueType)" `
            -Value "merged_font.ttf" `
            -PropertyType String `
            -Force

      - name: Run CTRFontConverter
        run: |
          $D = "${{ github.workspace }}"
          & "$D\ctrfontconverter\ctr_FontConverterConsole.exe" -i win -in "${{ env.FONT_NAME }}" `
            -is ${{ github.event.inputs.font_size }} `
            -ic A4 `
            -o bcfnt -of fonttool/SystemFont.bcfnt `
            -f "$D\ctrfontconverter\xllt\3ds_bitmap_font_std.xllt"

      - name: Run FontTool
        run: |
          cd fonttool
          python3 FontTool.py -font SystemFont.bcfnt
          exit 0
          
      - name: Generate font preview
        run: |
          pip install pillow --quiet
          python3 -c "
          from PIL import Image, ImageDraw, ImageFont
          import os

          img = Image.new('RGB', (200, 100), color='white')
          draw = ImageDraw.Draw(img)
          font = ImageFont.truetype('C:/Windows/Fonts/merged_font.ttf', 72)

          bbox = draw.textbbox((0, 0), 'Aa', font=font)
          w = bbox[2] - bbox[0]
          h = bbox[3] - bbox[1]
          x = (200 - w) // 2 - bbox[0]
          y = (100 - h) // 2 - bbox[1]

          draw.text((x, y), 'Aa', font=font, fill='black')
          os.makedirs('fonts/previews', exist_ok=True)
          img.save('fonts/previews/${{ env.FONT_NAME }}.png')
          "

      - name: Commit preview to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fonts/previews/
          git diff --staged --quiet || git commit -m "Add preview for ${{ env.FONT_NAME }}"
          git push

      - name: Publish font as release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FONT_NAME_SLUG }}
          name: ${{ env.FONT_NAME }}
          files: fonttool/SystemFont.cia

