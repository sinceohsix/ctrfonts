name: ctrfont2

on:
  workflow_dispatch:
    inputs:
      font_url:
        description: 'URL to a TTF/OTF font file'
        required: true
      font_size:
        description: 'Font size in points'
        required: true
        default: '20'
      font_name:
        description: 'Output name (e.g. PopHappiness)'
        required: true

defaults:
  run:
    shell: pwsh

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download custom font
        run: curl -L "${{ github.event.inputs.font_url }}" -o mergefonts/custom_font.ttf

      - name: Merge custom font w/ nintendo_NTLG-DB_001.ttf
        run: |
          fontforge/bin/fontforge.exe mergefonts/merge-fonts.py \
            mergefonts/custom_font.ttf \
            mergefonts/nintendo_NTLG-DB_001.ttf \
            mergefonts/merged_font.ttf
            
      - name: Get name of custom font
        run: |
          pip install fonttools --quiet
          $fontName = python3 -c "from fontTools.ttLib import TTFont; tt = TTFont('mergefonts/merged_font.ttf'); print(tt['name'].getDebugName(1))"
          echo "FONT_NAME=$fontName" >> $env:GITHUB_ENV
          
      - name: Install merged font to Windows
        run: |
          Copy-Item mergefonts/merged_font.ttf -Destination "C:\Windows\Fonts\merged_font.ttf"
          New-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Fonts" `
            -Name "${{ env.FONT_NAME }} (TrueType)" `
            -Value "merged_font.ttf" `
            -PropertyType String `
            -Force

      - name: Run CTRFontConverter
        run: |
          $D = "${{ github.workspace }}"
          & "$D\ctrfontconverter\ctr_FontConverterConsole.exe" -i win -in "${{ env.FONT_NAME }}" `
            -is ${{ github.event.inputs.font_size }} `
            -ic A4 `
            -o bcfnt -of fonttool/SystemFont.bcfnt `
            -f "$D\ctrfontconverter\xllt\3ds_bitmap_font_std.xllt"

      - name: Run FontTool
        run: |
          cd fonttool
          python3 FontTool.py -font SystemFont.bcfnt
          exit 0

      - name: Upload CIA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.font_name }}Font
          path: |
            fonttool/SystemFont.cia
            mergefonts/merged_font.ttf
